<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Prosperity's Products</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #0f172a 0%, #1a1625 50%, #0d2b2d 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .checkout-container { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; padding: 40px; backdrop-filter: blur(10px); max-width: 500px; width: 100%; }
        h1 { font-size: 32px; color: #fff; margin-bottom: 8px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; color: #fff; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 16px; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; background: rgba(255, 255, 255, 0.05); color: #fff; font-size: 14px; }
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #00D9FF, #A855F7); color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="checkout-container">
        <h1>Get Started</h1>
        <form onsubmit="submitOrder(event)">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" required placeholder="Your name">
            </div>
            <button type="submit" class="submit-btn">Continue to Payment</button>
        </form>
    </div>
    <script>
        function submitOrder(e) {
            e.preventDefault();
            alert('Order received! Check your email for next steps.');
            window.location.href = '/index.html';
        }
    </script>
</body>
</html>
